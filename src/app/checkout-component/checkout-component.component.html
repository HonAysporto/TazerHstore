<app-navbar [showSearch]="false"></app-navbar>
<div class="container my-5">
  <h3 class="fw-bold mb-4">Checkout</h3>

  <div class="row">

    <!-- LEFT: Address Form -->
    <div class="col-lg-7">
      <div class="card p-4 mb-4">
        <h5>Customer Info</h5>
        <input type="text" class="form-control mb-2" [value]="user.firstname" readonly>
        <input type="text" class="form-control mb-2" [value]="user.lastname" readonly>
        <input type="text" class="form-control mb-2" [value]="user.email" readonly>
        <input type="text" class="form-control mb-2" [value]="user.phonenumber" readonly>
      </div>

      <div class="card p-4">
        <h5>Delivery Address</h5>
        <textarea class="form-control mb-3" [(ngModel)]="address" rows="4" placeholder="Enter delivery address"></textarea>
        <button class="btn btn-primary w-100" (click)="pay()">
          Proceed to Payment
        </button>
      </div>
    </div>

    <!-- RIGHT: Order Summary -->
    <div class="col-lg-5 mt-4 mt-lg-0">
      <div class="card p-4 summary-card">
        <h5>Order Summary</h5>
        <div *ngFor="let item of cartItems" class="d-flex justify-content-between mb-2">
          <span>{{ item.product_name }} x{{ item.quantity }}</span>
          <span>₦{{ item.product_price * item.quantity }}</span>
        </div>
        <hr>
        <div class="d-flex justify-content-between">
          <strong>Total</strong>
          <strong>₦{{ total }}</strong>
        </div>
      </div>
    </div>

  </div>
</div>
