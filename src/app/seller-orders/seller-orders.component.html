<div class="container my-5">

  <h3 class="fw-bold mb-4">Manage Orders</h3>

  <div *ngFor="let order of orders" class="card mb-4 p-3 shadow-sm">

    <!-- HEADER -->
    <div class="d-flex justify-content-between mb-2">
      <strong>Order #{{ order.order_id }}</strong>
      <span class="badge bg-dark">{{ order.status }}</span>
    </div>

    <small class="text-muted mb-2">
      Address: {{ order.address }}
    </small>

    <hr>

    <!-- ITEMS -->
    <div *ngFor="let item of order.items" class="d-flex align-items-center mb-2">
      <img [src]="item.product_image" width="50" class="me-2 rounded">
      <div class="flex-grow-1">
        {{ item.product_name }} x{{ item.quantity }}
      </div>
      <strong>₦{{ item.price * item.quantity }}</strong>
    </div>

    <hr>

    <!-- ACTIONS -->
    <div class="d-flex gap-2 flex-wrap">

      <button class="btn btn-sm btn-warning"
        (click)="updateStatus(order.order_id, 'processing')">
        Processing
      </button>

      <button class="btn btn-sm btn-primary"
        (click)="updateStatus(order.order_id, 'shipped')">
        Shipped
      </button>

      <button class="btn btn-sm btn-success"
        (click)="updateStatus(order.order_id, 'delivered')">
        Delivered
      </button>

    </div>

  </div>

</div>
